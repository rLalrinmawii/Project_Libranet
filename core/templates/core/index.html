<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Books</title>
</head>
<body>
    <h1>Amazon Books List</h1>
    <table border="1">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Rating</th>
            <th>Reviews Count</th>
            <th>Categories</th>
            <th>Best Sellers Rank</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.rating }}</td>
            <td>{{ book.reviews_count }}</td>
            <td>{{ book.categories }}</td>
            <td>{{ book.best_sellers_rank }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
